name: Generate Stats

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Generate stats via Python
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python generate_stats.py

      - name: Update README with new cache buster
        run: |
          CACHE=$(cat cache_version.txt)
          sed -i "s|github-stats.svg?v=[0-9]*|github-stats.svg?v=$CACHE|g" README.md
          sed -i "s|github-langs.svg?v=[0-9]*|github-langs.svg?v=$CACHE|g" README.md

      - name: Commit & Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add github-stats.svg github-langs.svg cache_version.txt README.md
          git diff --staged --quiet || git commit -m "🔄 Auto-update stats"
          git push
