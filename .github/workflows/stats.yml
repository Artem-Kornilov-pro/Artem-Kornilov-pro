name: Generate Stats

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download GitHub Stats
        run: |
          curl -o github-stats.svg \
          "https://github-readme-stats-git-masterrstaa-rickstaa.vercel.app/api?username=Artem-Kornilov-pro&show_icons=true&theme=radical&count_private=true"

      - name: Download Top Languages
        run: |
          curl -o github-langs.svg \
          "https://github-readme-stats-git-masterrstaa-rickstaa.vercel.app/api/top-langs/?username=Artem-Kornilov-pro&layout=compact&theme=radical&langs_count=8"

      - name: Commit & Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add github-stats.svg github-langs.svg
          git diff --staged --quiet || git commit -m "🔄 Auto-update stats"
          git push
